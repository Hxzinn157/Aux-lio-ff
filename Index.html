<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Mod Menu</title>

<style>
body{
    margin:0;
    background:black;
    font-family:Courier New, monospace;
    color:#00ff99;
    overflow:hidden;
}

/* MATRIX FUNDO */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* INJEÇÃO PEQUENA */
#injectPanel{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    height:180px;
    background:#000;
    border:2px solid #00ffff;
    border-radius:12px;
    padding:15px;
    box-shadow:0 0 20px #00ffff;
}

#injectPanel h3{
    font-size:13px;
    margin:0 0 10px 0;
}

#terminal{
    height:80px;
    overflow:auto;
    font-size:11px;
}

#progress{
    height:8px;
    width:0%;
    background:#00ffff;
    margin-top:8px;
}

/* MENU GRANDE */
#mainMenu{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    background:#000;
    border:3px solid #00ffff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 30px #00ffff;
}

.option{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
    padding:12px;
    border:1px solid #00ffff;
    border-radius:10px;
    background:#111;
}

.toggle{
    cursor:pointer;
    color:red;
    font-weight:bold;
}

.toggle.active{
    color:#00ff99;
}

/* TÍTULO */
h3{
    text-align:center;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="injectPanel">
<h3>INJETANDO SISTEMA...</h3>
<div id="terminal"></div>
<div id="progress"></div>
</div>

<div id="mainMenu">
<h3>FF MOD MENU (VISUAL)</h3>

<div class="option">
<span>120 FPS</span>
<span class="toggle">OFF</span>
</div>

<div class="option">
<span>Bugar Gráfico Automático</span>
<span class="toggle">OFF</span>
</div>

<div class="option">
<span>Ultra Performance</span>
<span class="toggle">OFF</span>
</div>

<div class="option">
<span>Modo HDR+</span>
<span class="toggle">OFF</span>
</div>

<div class="option">
<span>Anti-Lag Turbo</span>
<span class="toggle">OFF</span>
</div>

<div class="option">
<span>Interface Pro Player</span>
<span class="toggle">OFF</span>
</div>

</div>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width/fontSize;
const drops = [];
for(let x=0;x<columns;x++) drops[x]=1;

function drawMatrix(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#00ff99";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);
        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;
        drops[i]++;
    }
}
setInterval(drawMatrix,33);

/* INJEÇÃO */
const terminal=document.getElementById("terminal");
const progress=document.getElementById("progress");
const injectPanel=document.getElementById("injectPanel");
const mainMenu=document.getElementById("mainMenu");

let percent=0;

const injectInterval=setInterval(()=>{
    percent++;
    progress.style.width=percent+"%";
    terminal.innerHTML+="0x"+Math.random().toString(16).substr(2,6).toUpperCase()+" :: carregando...<br>";
    terminal.scrollTop=terminal.scrollHeight;

    if(percent>=100){
        clearInterval(injectInterval);
        terminal.innerHTML+="<br>>> INJETADO COM SUCESSO <<<";
        setTimeout(()=>{
            injectPanel.style.display="none";
            mainMenu.style.display="block";
        },1500);
    }
},40);

/* TOGGLES */
document.querySelectorAll(".toggle").forEach(toggle=>{
    toggle.addEventListener("click",()=>{
        toggle.classList.toggle("active");
        toggle.textContent = toggle.classList.contains("active") ? "ON" : "OFF";
    });
});
</script>

</body>
</html>
